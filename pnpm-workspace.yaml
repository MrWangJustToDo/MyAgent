packages:
  - "packages/*"
allowBuilds:
  "@heroui/shared-utils": true
  "@mongodb-js/zstd": true
  esbuild: false
  node-liblzma: false
  sharp: true
  spawn-sync: false
  unrs-resolver: false

minimumReleaseAgeExclude:
  - "@my-react/react-dom@0.3.25"
  - "@my-react/react-jsx@0.3.25"
  - "@my-react/react-refresh@0.3.25"
  - "@my-react/react-terminal@0.0.24"
  - "@my-react/react-vite@0.0.31"
  - "@my-react/react@0.3.25"
  - ink-stream-markdown@0.0.2

publicHoistPattern:
  - "*eslint-*"
  - "*@heroui/*"
  - "*@my-react/*"
  - "*@my-agent/*"
