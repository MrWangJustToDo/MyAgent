packages:
  - "packages/*"
allowBuilds:
  "@heroui/shared-utils": true
  "@mongodb-js/zstd": true
  esbuild: false
  node-liblzma: false
  sharp: true
  spawn-sync: false
  unrs-resolver: false

minimumReleaseAgeExclude:
  - ink-stream-markdown@0.0.2
  - '@git-diff-view/cli@0.1.5'
  - '@git-diff-view/core@0.1.5'
  - '@git-diff-view/file@0.1.5'
  - '@git-diff-view/lowlight@0.1.5'
  - '@my-react/react-dom@0.3.27'
  - '@my-react/react-jsx@0.3.27'
  - '@my-react/react-refresh@0.3.27'
  - '@my-react/react-terminal@0.0.26'
  - '@my-react/react-vite@0.0.33'
  - '@my-react/react@0.3.27'

publicHoistPattern:
  - "*eslint-*"
  - "*@heroui/*"
  - "*@my-react/*"
  - "*@my-agent/*"
