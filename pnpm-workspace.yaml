packages:
  - "packages/*"
allowBuilds:
  "@heroui/shared-utils": true
  "@mongodb-js/zstd": true
  esbuild: false
  node-liblzma: false
  sharp: true
  spawn-sync: false
  unrs-resolver: false

minimumReleaseAgeExclude:
  - "@my-react/react-dom@0.3.28"
  - "@my-react/react-jsx@0.3.28"
  - "@my-react/react-refresh@0.3.28"
  - "@my-react/react-terminal@0.0.27"
  - "@my-react/react-vite@0.0.34"
  - "@my-react/react@0.3.28"
  - ink-stream-markdown@0.0.8
  - "@ai-sdk/mcp@1.0.44"
  - "@ai-sdk/gateway@3.0.127"
  - "@ai-sdk/openai@3.0.69"
  - "@ai-sdk/react@3.0.201"
  - ai@6.0.199
  - "@git-diff-view/core@0.1.6"
  - "@git-diff-view/file@0.1.6"
  - "@git-diff-view/lowlight@0.1.6"
  - "@git-diff-view/cli@0.1.7"

publicHoistPattern:
  - "*eslint-*"
  - "*@heroui/*"
  - "*@my-react/*"
  - "*@my-agent/*"
