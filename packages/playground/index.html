<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Agent — WebContainer Playground</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <!-- COI for static hosts (GitHub Pages). Vite dev already sets COOP/COEP headers. -->
    <script>
      (function () {
        // Dev mode: Vite server already sends COOP/COEP headers → no SW needed.
        // Production (GitHub Pages): no custom headers → register SW for isolation.
        if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
          // Unregister any stale SW from previous sessions
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) {
                r.unregister();
              });
            });
          }
          return;
        }
        var s = document.createElement("script");
        s.src = "./coi-serviceworker.js";
        document.head.appendChild(s);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
