name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "packages/playground/**"
      - "packages/app/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/playground-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playground-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build playground
        env:
          # Prefer repo Variables; also accept Secrets (same name) if Variables is empty.
          # Must be Repository-level (not only the github-pages Environment) — the build job has no environment.
          VITE_FETCH_PROXY_URL: ${{ vars.VITE_FETCH_PROXY_URL || secrets.VITE_FETCH_PROXY_URL }}
        run: |
          if [ -n "$VITE_FETCH_PROXY_URL" ]; then
            echo "VITE_FETCH_PROXY_URL is set (length=${#VITE_FETCH_PROXY_URL})"
          else
            echo "::warning::VITE_FETCH_PROXY_URL is empty — webfetch/websearch will fail on GitHub Pages. Add a Repository Variable or Secret named VITE_FETCH_PROXY_URL, then re-run this workflow."
          fi
          pnpm build:core && pnpm build:app && pnpm build:playground

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
